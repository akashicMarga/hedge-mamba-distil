# HedgeMamba distillation config for IndicParlerTTS
# Mirrors whisper_tiny_to_mamba.yaml but adapted for the 24-layer
# Parler decoder (hidden=1024, 9 codebooks, 44100 Hz / 512 frame rate).

teacher:
  repo_id: "ai4bharat/indic-parler-tts"
  # T5 encoder and DAC decoder are not distilled; only the AR decoder matters

student:
  state_size: null        # null = hidden_size (1024), paper default N=D
                          # Reduce to 256/512 for faster training & inference
                          # at cost of quality

# ---------------------------------------------------------------------------
# Stage 1: cosine distillation (SSM layers only)
# ---------------------------------------------------------------------------
stage1:
  epochs: 3
  batch_size: 4
  learning_rate: 3.0e-4
  weight_decay:  1.0e-4
  warmup_steps:  200
  grad_clip:     1.0
  log_every:     50
  eval_every:    500
  checkpoint_dir: "./checkpoints/parler_mamba"

  # Dataset: use teacher-generated codec sequences for supervision.
  # Any text-to-speech dataset with (description, transcript) pairs works;
  # the teacher runs offline to produce decoder_input_ids + labels.
  dataset: "parler-tts/parler-tts-mini-v1"
  max_seq_len: 512   # decoder sequence length (T); ~6s at 44100/512

# ---------------------------------------------------------------------------
# Stage 2: CE fine-tuning with scheduled sampling
# ---------------------------------------------------------------------------
stage2:
  epochs: 5
  batch_size: 4
  learning_rate: 1.0e-4
  weight_decay:  1.0e-4
  warmup_steps:  200
  grad_clip:     1.0
  log_every:     50
  eval_every:    500
  ss_max_p:      0.5     # max fraction of tokens replaced by student's own preds
  checkpoint_dir: "./checkpoints/parler_mamba"

  dataset: "parler-tts/parler-tts-mini-v1"
  max_seq_len: 512

# ---------------------------------------------------------------------------
# Export
# ---------------------------------------------------------------------------
export:
  output_path: "./checkpoints/parler_mamba_stage2.npz"
  # Load with:
  #   from models.indic_parler_tts.mamba_model import IndicParlerTTSMamba
  #   model = IndicParlerTTSMamba.load_from_pt_checkpoint(output_path)
